<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="52" fill="#080c18"/>
  <!-- Subtle border -->
  <rect width="256" height="256" rx="52" fill="none" stroke="url(#g1)" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- W letterform -->
  <path d="M 44 72 L 78 182 L 128 110 L 178 182 L 212 72"
    stroke="url(#g1)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"
    fill="none" filter="url(#glow)"/>

  <!-- Signal arcs — top right corner -->
  <path d="M 192 52 A 44 44 0 0 1 236 96" stroke="url(#g1)" stroke-width="6.5" stroke-linecap="round" fill="none" opacity="0.8"/>
  <path d="M 192 68 A 28 28 0 0 1 220 96" stroke="url(#g2)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.55"/>
  <!-- Signal dot -->
  <circle cx="193" cy="97" r="6" fill="url(#g1)" opacity="0.9" filter="url(#glow)"/>
</svg>
